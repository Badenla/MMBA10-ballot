<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MMBA 10 — Case Ballot</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink: #1a1a2e;
  --ink2: #4a4a6a;
  --ink3: #8888aa;
  --paper: #f8f7f4;
  --surface: #ffffff;
  --blue: #2563eb;
  --blue-light: #eff6ff;
  --blue-mid: #bfdbfe;
  --green: #059669;
  --green-light: #ecfdf5;
  --amber: #d97706;
  --amber-light: #fffbeb;
  --red: #dc2626;
  --red-light: #fef2f2;
  --border: #e5e4df;
  --radius: 12px;
  --radius-sm: 8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  padding:0;
}
.page-header{
  background:var(--ink);
  color:#fff;
  padding:2rem 2rem 1.5rem;
  position:relative;
  overflow:hidden;
}
.page-header::before{
  content:'';
  position:absolute;
  width:300px;height:300px;
  border-radius:50%;
  background:rgba(37,99,235,0.15);
  top:-100px;right:-80px;
  pointer-events:none;
}
.page-header h1{
  font-family:'DM Serif Display',serif;
  font-size:clamp(1.6rem,4vw,2.2rem);
  font-weight:400;
  letter-spacing:-0.5px;
  margin-bottom:4px;
}
.page-header p{font-size:14px;color:rgba(255,255,255,0.6);font-weight:300;}
.pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;
}
.pill-blue{background:var(--blue-light);color:var(--blue);}
.pill-green{background:var(--green-light);color:var(--green);}
.pill-amber{background:var(--amber-light);color:var(--amber);}
.pills{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
.main{padding:1.5rem;}
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1.25rem 1.5rem;
  margin-bottom:1rem;
}
.card-title{font-size:13px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:1rem;}
.input-row{display:flex;gap:8px;flex-wrap:wrap;}
input[type=text]{
  flex:1;min-width:180px;
  padding:10px 14px;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  font-size:14px;
  font-family:'DM Sans',sans-serif;
  background:var(--paper);
  color:var(--ink);
  outline:none;
  transition:border-color .2s;
}
input[type=text]:focus{border-color:var(--blue);}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 18px;
  border-radius:var(--radius-sm);
  font-size:14px;font-weight:500;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--ink);
  transition:all .15s;
  white-space:nowrap;
}
.btn:hover{background:var(--paper);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-primary:hover{background:#1d4ed8;}
.btn-green{background:var(--green);color:#fff;border-color:var(--green);}
.btn-green:hover{background:#047857;}
.btn-red{background:var(--red-light);color:var(--red);border-color:#fca5a5;}
.btn-red:hover{background:#fee2e2;}
.suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.sugg-btn{
  padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;
  border:1px solid var(--border);background:var(--paper);color:var(--ink2);
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;
}
.sugg-btn:hover{background:var(--blue-light);border-color:var(--blue-mid);color:var(--blue);}
.progress-wrap{margin-bottom:1.25rem;}
.progress-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--ink3);margin-bottom:6px;}
.progress-track{height:6px;background:var(--border);border-radius:6px;overflow:hidden;}
.progress-fill{height:100%;background:var(--blue);border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.member-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:8px;
}
.chip{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:var(--paper);
  font-size:13px;font-weight:400;
  transition:all .2s;
}
.chip.joined{background:var(--surface);border-color:var(--blue-mid);}
.chip.pending{opacity:.35;}
.num-circle{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;flex-shrink:0;
}
.num-circle.has-num{background:var(--blue-light);color:var(--blue);}
.num-circle.no-num{background:var(--border);color:var(--ink3);}
.your-number-card{
  text-align:center;
  padding:1.5rem 1rem;
}
.big-num{
  font-family:'DM Serif Display',serif;
  font-size:72px;color:var(--blue);
  line-height:1;margin:0.5rem 0;
}
.your-name-label{font-size:16px;font-weight:500;}
.your-sub{font-size:13px;color:var(--ink3);margin-top:4px;}
.alert{
  padding:10px 14px;border-radius:var(--radius-sm);
  font-size:13px;margin-bottom:1rem;
  display:flex;align-items:center;gap:8px;
}
.alert-ok{background:var(--green-light);color:var(--green);border:1px solid #a7f3d0;}
.alert-info{background:var(--blue-light);color:var(--blue);border:1px solid var(--blue-mid);}
.alert-warn{background:var(--amber-light);color:var(--amber);border:1px solid #fde68a;}
.section-heading{
  font-size:12px;font-weight:600;color:var(--ink2);
  text-transform:uppercase;letter-spacing:.6px;
  margin:1.5rem 0 .75rem;
  display:flex;align-items:center;gap:8px;
}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{
  padding:8px 12px;text-align:left;
  font-size:11px;font-weight:600;color:var(--ink3);
  text-transform:uppercase;letter-spacing:.5px;
  border-bottom:1px solid var(--border);
  background:var(--paper);
}
td{padding:9px 12px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr.highlight td{background:var(--blue-light);}
.pair-tag{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--paper);border:1px solid var(--border);
  border-radius:20px;padding:3px 10px;font-size:12px;
}
.table-wrap{
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  overflow-x:auto;
  margin-bottom:1rem;
}
.divider{border:none;border-top:1px solid var(--border);margin:1.25rem 0;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
svg.icon{width:15px;height:15px;display:inline-block;vertical-align:-2px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
</style>
</head>
<body>

<div class="page-header">
  <h1>MMBA 10 Case Ballot</h1>
  <p>Year 1 · 2nd Semester · May – August 2026</p>
  <div class="pills">
    <span class="pill pill-blue">14 members</span>
    <span class="pill pill-green">11 CMA cases</span>
    <span class="pill pill-amber">10 OPM cases</span>
  </div>
</div>

<div class="main">
  <div id="app"></div>
</div>

<script>
const MEMBERS = [
  {full:"Agboola Elizabeth",first:"Elizabeth"},
  {full:"Amagwula Amarachi",first:"Amarachi"},
  {full:"Anigbogu Chizaram",first:"Chizaram"},
  {full:"Baderinwa Adedamola",first:"Adedamola"},
  {full:"Enakhimion Joy",first:"Joy"},
  {full:"Fakayode Foluso",first:"Foluso"},
  {full:"Irevah Benjamin",first:"Benjamin"},
  {full:"Odufuwa Adekunle",first:"Adekunle O."},
  {full:"Ogunjirin Oluwasotun",first:"Oluwasotun"},
  {full:"Okuru Osayi",first:"Osayi"},
  {full:"Oloye Adekunle",first:"Adekunle Ol."},
  {full:"Omuabor Emmanuel",first:"Emmanuel"},
  {full:"Oyaniran Lanre",first:"Lanre"},
  {full:"Sogaolu Oluwatobi",first:"Oluwatobi"}
];

const CMA = [
  {name:"Lunch Box",week:"W1",date:"Jun 6"},
  {name:"Hanson Manufacturing Company",week:"W2",date:"Jun 9–13"},
  {name:"Prestige Telephone Company",week:"W3",date:"Jun 13–22"},
  {name:"Sheridan Carpets",week:"W4a",date:"Jun 23"},
  {name:"Huron Automotive Company",week:"W4b",date:"Jun 23–25"},
  {name:"Industrial Grinders",week:"W5a",date:"Jun 25"},
  {name:"Symalit A.G.",week:"W5b",date:"Jun 26"},
  {name:"Signatron Corporation",week:"W6a",date:"Jun 30"},
  {name:"Mueller-Lemkhul GmbH",week:"W7",date:"Jul 14–15"},
  {name:"Destin Brass Products Company",week:"W8",date:"Jul 18"},
  {name:"Agbero Nig. Ltd.",week:"W9",date:"Aug 12"}
];

const OPM = [
  {name:"Kristen's Cookie Company (A)",week:"W1b",date:"Jun 4"},
  {name:"Talent Dry Cleaners",week:"W2b",date:"Jun 13"},
  {name:"AgroLo",week:"W3b",date:"Jun 20"},
  {name:"University Health Service: Walk-in Clinic",week:"W6b",date:"Jul 2"},
  {name:"Tallus Packaging",week:"W6c",date:"Jul 4"},
  {name:"Chaircraft Corporation",week:"W10",date:"Jul 29"},
  {name:"Pharmacy Service Improvement at CVS (A)",week:"W11a",date:"Aug 1"},
  {name:"Hangars to Helipads",week:"W11b",date:"Aug 1"},
  {name:"Ojema – The Plant Manager",week:"W12",date:"Aug 8"},
  {name:"Lex Service Group",week:"W13",date:"Aug 19"}
];

const KEY = "mmba10-ballot-v4";
let state = {members:{}, locked:false, pairs:null};
let myFull = null;

function getFirst(full){ return MEMBERS.find(m=>m.full===full)?.first || full; }

async function load(){
  try{
    const r = await window.storage.get(KEY, true);
    if(r && r.value) state = JSON.parse(r.value);
  } catch(e){ state={members:{},locked:false,pairs:null}; }
}

async function save(){
  try{ await window.storage.set(KEY, JSON.stringify(state), true); } catch(e){}
}

function shuffle(a){
  a=[...a];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function tryAssign(cases, used, mwc){
  for(let t=0;t<3000;t++){
    const s=shuffle([...Array(14).keys()]);
    const pairs=[];let ok=true;
    for(let i=0;i<cases.length;i++){
      const a=s[i*2],b=s[i*2+1];
      const k=Math.min(a,b)+'-'+Math.max(a,b);
      if(used.has(k)){ok=false;break;}
      pairs.push({a,b,c:cases[i],k});
    }
    if(!ok) continue;
    for(const p of pairs){
      if(mwc[p.a]?.[p.c.week]||mwc[p.b]?.[p.c.week]){ok=false;break;}
    }
    if(ok) return pairs;
  }
  return null;
}

function generate(ordered){
  const used=new Set(), mwc={};
  for(let i=0;i<14;i++) mwc[i]={};
  let cr=null,t=0;
  while(t++<500&&!cr) cr=tryAssign(CMA,used,mwc);
  if(!cr) return null;
  cr.forEach(p=>{used.add(p.k);mwc[p.a][p.c.week]=1;mwc[p.b][p.c.week]=1;});
  let or=null;t=0;
  while(t++<500&&!or) or=tryAssign(OPM,used,mwc);
  if(!or) return null;
  return {
    cma:cr.map(p=>({c:p.c,a:ordered[p.a],b:ordered[p.b]})),
    opm:or.map(p=>({c:p.c,a:ordered[p.a],b:ordered[p.b]}))
  };
}

function icon(path){
  return `<svg class="icon" viewBox="0 0 24 24"><path d="${path}"/></svg>`;
}
const ICO_CHECK="M20 6L9 17l-5-5";
const ICO_REFRESH="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15";
const ICO_TRASH="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6";
const ICO_BOLT="M13 2L3 14h9l-1 8 10-12h-9l1-8";
const ICO_USERS="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75";
const ICO_COPY="M8 4H6a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-2M8 4a2 2 0 002 2h4a2 2 0 002-2M8 4a2 2 0 012-2h4a2 2 0 012 2";

function render(){
  const count=Object.keys(state.members).length;
  const app=document.getElementById('app');
  if(state.locked&&state.pairs){renderResults(app);return;}
  const me=myFull?state.members[myFull]:null;
  let h='';

  if(!me){
    h+=`<div class="card">
      <div class="card-title">Pick your number</div>
      <div class="input-row">
        <input type="text" id="ni" placeholder="Type your first name…"/>
        <button class="btn btn-primary" onclick="join()">
          ${icon("M7 11l5-5m0 0l5 5m-5-5v12")} Pick my number
        </button>
      </div>
      <div id="sg" class="suggestions"></div>
    </div>`;
  } else {
    h+=`<div class="card">
      <div class="your-number-card">
        <div style="font-size:13px;color:var(--ink3);font-weight:500;text-transform:uppercase;letter-spacing:.6px">Your ballot number</div>
        <div class="big-num">${me.number}</div>
        <div class="your-name-label">${getFirst(myFull)}</div>
        <div class="your-sub">Waiting for the rest of the group…</div>
      </div>
    </div>`;
  }

  h+=`<div class="progress-wrap">
    <div class="progress-meta"><span>${count} of 14 joined</span><span>${14-count} remaining</span></div>
    <div class="progress-track"><div class="progress-fill" style="width:${Math.round(count/14*100)}%"></div></div>
  </div>`;

  h+=`<div class="section-heading">${icon(ICO_USERS)} Who's in</div>`;
  h+=`<div class="member-grid">`;
  MEMBERS.forEach(m=>{
    const e=state.members[m.full];
    if(e){
      h+=`<div class="chip joined"><div class="num-circle has-num">${e.number}</div><span>${m.first}</span></div>`;
    } else {
      h+=`<div class="chip pending"><div class="num-circle no-num">?</div><span>${m.first}</span></div>`;
    }
  });
  h+=`</div>`;

  if(count===14){
    h+=`<div class="divider"></div>
    <div class="alert alert-ok">${icon(ICO_CHECK)} All 14 members have joined — ready to generate pairs!</div>
    <button class="btn btn-green" onclick="lock()">${icon(ICO_BOLT)} Generate case pairs</button>`;
  }

  h+=`<div class="divider"></div>
  <div class="btn-row">
    <button class="btn" onclick="refresh()">${icon(ICO_REFRESH)} Refresh</button>
    <button class="btn btn-red" onclick="reset()">${icon(ICO_TRASH)} Reset ballot</button>
  </div>`;

  app.innerHTML=h;

  if(!me){
    const ni=document.getElementById('ni');
    const sg=document.getElementById('sg');
    suggest(ni,sg);
    ni.addEventListener('input',()=>suggest(ni,sg));
  }
}

function suggest(ni,sg){
  const v=ni.value.toLowerCase().trim();
  if(!v){sg.innerHTML='';return;}
  const m=MEMBERS.filter(m=>(m.first.toLowerCase().includes(v)||m.full.toLowerCase().includes(v))&&!state.members[m.full]);
  sg.innerHTML=m.map(m=>`<button class="sugg-btn" onclick="pick('${m.full}')">${m.first}</button>`).join('');
}

function pick(full){
  const m=MEMBERS.find(x=>x.full===full);
  const ni=document.getElementById('ni');
  ni.value=m.first;
  ni.dataset.sel=full;
  document.getElementById('sg').innerHTML='';
}

async function join(){
  const ni=document.getElementById('ni');
  const sel=ni.dataset.sel||null;
  const typed=ni.value.trim().toLowerCase();
  const match=sel?MEMBERS.find(m=>m.full===sel):MEMBERS.find(m=>m.first.toLowerCase()===typed||m.full.toLowerCase()===typed);
  if(!match){alert('Please select your name from the suggestions.');return;}
  await load();
  if(state.members[match.full]){myFull=match.full;render();return;}
  const used=new Set(Object.values(state.members).map(e=>e.number));
  const avail=[];for(let i=1;i<=14;i++)if(!used.has(i))avail.push(i);
  const num=avail[Math.floor(Math.random()*avail.length)];
  state.members[match.full]={number:num,joinedAt:Date.now()};
  myFull=match.full;
  await save();render();
}

async function lock(){
  await load();
  if(Object.keys(state.members).length<14){alert('Not all 14 members have joined yet.');return;}
  const ordered=Object.entries(state.members).sort((a,b)=>a[1].number-b[1].number).map(e=>e[0]);
  const pairs=generate(ordered);
  if(!pairs){alert('Could not find valid pairs. Please reset and try again.');return;}
  state.locked=true;state.pairs=pairs;
  await save();render();
}

function renderResults(app){
  const pairs=state.pairs;
  let h=`<div class="alert alert-ok">${icon(ICO_CHECK)} Ballot complete — all pairs locked in.</div>`;

  h+=`<div class="section-heading"><span class="pill pill-blue" style="font-size:11px">CMA</span> Cost &amp; Management Accounting</div>`;
  h+=`<div class="table-wrap"><table><thead><tr><th>#</th><th>Case</th><th>Date</th><th>Pair</th></tr></thead><tbody>`;
  pairs.cma.forEach((p,i)=>{
    const A=getFirst(p.a),B=getFirst(p.b);
    const me=myFull&&(p.a===myFull||p.b===myFull);
    h+=`<tr${me?' class="highlight"':''}><td style="color:var(--ink3);font-weight:500">${i+1}</td><td>${p.c.name}</td><td style="color:var(--ink3);font-size:12px;white-space:nowrap">${p.c.date}</td><td><span class="pair-tag">${A} &amp; ${B}</span></td></tr>`;
  });
  h+=`</tbody></table></div>`;

  h+=`<div class="section-heading"><span class="pill pill-green" style="font-size:11px">OPM</span> Operations Management</div>`;
  h+=`<div class="table-wrap"><table><thead><tr><th>#</th><th>Case</th><th>Date</th><th>Pair</th></tr></thead><tbody>`;
  pairs.opm.forEach((p,i)=>{
    const A=getFirst(p.a),B=getFirst(p.b);
    const me=myFull&&(p.a===myFull||p.b===myFull);
    h+=`<tr${me?' class="highlight"':''}><td style="color:var(--ink3);font-weight:500">${i+1}</td><td>${p.c.name}</td><td style="color:var(--ink3);font-size:12px;white-space:nowrap">${p.c.date}</td><td><span class="pair-tag">${A} &amp; ${B}</span></td></tr>`;
  });
  h+=`</tbody></table></div>`;

  h+=`<div class="section-heading">${icon(ICO_USERS)} Full assignment summary</div>`;
  h+=`<div class="table-wrap"><table><thead><tr><th>Name</th><th>CMA case</th><th>OPM case</th></tr></thead><tbody>`;
  const pm={};
  MEMBERS.forEach(m=>{pm[m.full]={cma:'-',opm:'-'};});
  pairs.cma.forEach(p=>{pm[p.a].cma=p.c.name;pm[p.b].cma=p.c.name;});
  pairs.opm.forEach(p=>{pm[p.a].opm=p.c.name;pm[p.b].opm=p.c.name;});
  MEMBERS.forEach(m=>{
    const me=myFull===m.full;
    h+=`<tr${me?' class="highlight"':''}><td style="font-weight:500">${m.first}</td><td style="font-size:12px">${pm[m.full].cma}</td><td style="font-size:12px">${pm[m.full].opm}</td></tr>`;
  });
  h+=`</tbody></table></div>`;

  h+=`<div class="divider"></div>
  <div class="btn-row">
    <button class="btn btn-red" onclick="reset()">${icon(ICO_TRASH)} Reset &amp; redo ballot</button>
  </div>`;
  app.innerHTML=h;
}

async function refresh(){await load();render();}

async function reset(){
  if(!confirm('Reset the entire ballot? All numbers and pairs will be cleared.'))return;
  state={members:{},locked:false,pairs:null};myFull=null;
  await save();render();
}

async function init(){
  await load();render();
  setInterval(async()=>{await load();render();},5000);
}
init();
</script>
</body>
</html>
